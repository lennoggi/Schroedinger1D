CXX      = c++
CXXFLAGS = -std=c++17

##LDFLAGS = -rdynamic
LDFLAGS =

OPTIMIZE           = yes
CXX_OPTIMIZE_FLAGS = -pipe -march=native -malign-double -Ofast

WARN           = yes
CXX_WARN_FLAGS = -Wall

DEBUG           = no
CXX_DEBUG_FLAGS = -g3

HDF5_INC_DIR  = /usr/include/hdf5/serial
HDF5_LIBS_DIR = /usr/lib/x86_64-linux-gnu/hdf5/serial
HDF5_LIBS     = -lhdf5
